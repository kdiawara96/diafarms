spring.application.name=${APP_NAME}
server.port=${APP_PORT}

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST_NAME}:${POSTGRES_PORT}/${DATABASES_NAME}
spring.datasource.username=${POSTGRES_USER_NAME}
spring.datasource.password=${POSTGRES_USER_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# RSA Keys
rsa.public-key=classpath:certificats/public.pem
rsa.private-key=classpath:certificats/private.pem