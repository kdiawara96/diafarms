version: '3.8'

services:
  diafarms-api:
    build: .
    container_name: ${APP_NAME}-api
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8093"
    depends_on:
      - postgres
      - minio
    networks:
      - diafarms-network

  postgres:
    image: postgres:15
    container_name: ${APP_NAME}-db
    environment:
      POSTGRES_DB: ${DATABASES_NAME}
      POSTGRES_USER: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - diafarms-network

  minio:
    image: minio/minio:latest
    container_name: ${APP_NAME}-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - diafarms-network

volumes:
  postgres-data:
  minio-data:

networks:
  diafarms-network:
    driver: bridge